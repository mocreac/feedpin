<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" class="logo" alt="">
    <span class="title">Feedpin</span>
  </div>
  <div class="row">
    <div>
      <div class="label">Enabled</div>
      <div class="site" id="site"></div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="sep"></div>
  <div class="links">
    <a class="link" id="privacy" href="https://github.com/mocreac/feedpin" target="_blank">Privacy Policy <span class="link-arrow">&#x2197;</span></a>
    <a class="link" href="https://github.com/mocreac/feedpin" target="_blank">Source <span class="link-arrow">&#x2197;</span></a>
  </div>
  <div class="footer">
    <div class="version">v1.0</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
